<html ng-app="app">
<head>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="ctrl">

<h2>Counter: {{c}}</h2>

<button ng-click="inc()">Click Me</button>

<script>
var a = angular.module("app", []);

a.controller("ctrl", function($scope){
    $scope.c = 0;

    $scope.inc = function(){
        $scope.c++;
    };
});
</script>

</body>
</html>
